<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>☕ Coffee Shop — Owner Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-card: #1a1a2e;
      --bg-input: #16162a;
      --border-color: rgba(255,255,255,0.06);
      --border-glow: rgba(212,175,55,0.3);
      --text-primary: #f0f0f5;
      --text-secondary: #8888a0;
      --text-muted: #55556a;
      --accent-gold: #d4af37;
      --accent-gold-light: #f0d060;
      --accent-green: #00c896;
      --accent-red: #ff4757;
      --accent-blue: #4a90d9;
      --gradient-gold: linear-gradient(135deg, #d4af37, #f0d060);
      --font: 'Inter', -apple-system, sans-serif;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: var(--font);
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ──────────────────────────────────────────── */
    .header {
      background: rgba(10,10,15,0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-color);
      padding: 0 1.5rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .header .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 1.1rem;
    }
    .header .brand span {
      background: var(--gradient-gold);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      color: var(--accent-green);
    }
    .header .status .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent-green);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50% { opacity:0.5; transform:scale(0.8); }
    }

    /* ── Chat Area ───────────────────────────────────────── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .chat-area::-webkit-scrollbar { width: 5px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--bg-card); border-radius: 3px; }

    .welcome {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
    }
    .welcome .emoji { font-size: 3rem; margin-bottom: 1rem; }
    .welcome h2 {
      font-size: 1.3rem;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }
    .welcome p { font-size: 0.9rem; line-height: 1.6; max-width: 400px; margin: 0 auto; }
    .welcome .examples {
      margin-top: 1.5rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
    }
    .welcome .example-btn {
      padding: 8px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 100px;
      color: var(--text-secondary);
      font-size: 0.8rem;
      font-family: var(--font);
      cursor: pointer;
      transition: all 0.2s;
    }
    .welcome .example-btn:hover {
      border-color: var(--border-glow);
      color: var(--accent-gold);
      background: rgba(212,175,55,0.05);
    }

    /* Message Bubbles */
    .message {
      max-width: 85%;
      animation: fadeIn 0.3s ease;
    }
    .message.user { align-self: flex-end; }
    .message.system { align-self: flex-start; }

    .message .bubble {
      padding: 0.85rem 1.15rem;
      border-radius: 16px;
      font-size: 0.9rem;
      line-height: 1.5;
    }
    .message.user .bubble {
      background: var(--gradient-gold);
      color: #0a0a0f;
      border-bottom-right-radius: 4px;
      font-weight: 500;
    }
    .message.system .bubble {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-bottom-left-radius: 4px;
    }
    .message .meta {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 4px;
      padding: 0 4px;
    }
    .message.user .meta { text-align: right; }

    /* Pipeline result */
    .pipeline-result {
      margin-top: 0.75rem;
      padding: 0.75rem;
      background: var(--bg-primary);
      border-radius: 8px;
      font-size: 0.8rem;
    }
    .pipeline-result .step {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 3px 0;
      color: var(--text-secondary);
    }
    .pipeline-result .step .icon { font-size: 0.85rem; }
    .pipeline-result .status-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 100px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 8px;
    }
    .status-badge.deployed {
      background: rgba(0,200,150,0.1);
      color: var(--accent-green);
      border: 1px solid rgba(0,200,150,0.2);
    }
    .status-badge.rejected {
      background: rgba(255,71,87,0.1);
      color: var(--accent-red);
      border: 1px solid rgba(255,71,87,0.2);
    }
    .status-badge.error {
      background: rgba(255,140,0,0.1);
      color: var(--accent-gold);
      border: 1px solid rgba(255,140,0,0.2);
    }

    /* Loading dots */
    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 0.85rem 1.15rem;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      align-self: flex-start;
    }
    .typing-indicator .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: bounce 1.4s ease-in-out infinite;
    }
    .typing-indicator .dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    @keyframes fadeIn {
      from { opacity:0; transform:translateY(8px); }
      to { opacity:1; transform:translateY(0); }
    }

    /* ── Input Area ──────────────────────────────────────── */
    .input-area {
      padding: 1rem 1.5rem;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border-color);
      flex-shrink: 0;
    }
    .input-wrapper {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }
    .input-wrapper input {
      flex: 1;
      padding: 0.85rem 1.15rem;
      background: var(--bg-input);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      color: var(--text-primary);
      font-family: var(--font);
      font-size: 0.95rem;
      outline: none;
      transition: all 0.3s;
    }
    .input-wrapper input:focus {
      border-color: var(--accent-gold);
      box-shadow: 0 0 0 3px rgba(212,175,55,0.1);
    }
    .input-wrapper input::placeholder { color: var(--text-muted); }
    .send-btn {
      width: 48px; height: 48px;
      border-radius: 12px;
      border: none;
      background: var(--gradient-gold);
      color: #0a0a0f;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .send-btn:hover {
      box-shadow: 0 4px 20px rgba(212,175,55,0.3);
      transform: translateY(-1px);
    }
    .send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .input-hint {
      text-align: center;
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 0.5rem;
    }

    /* ── Responsive ──────────────────────────────────────── */
    @media (max-width: 640px) {
      .message { max-width: 92%; }
      .welcome .examples { flex-direction: column; align-items: center; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="brand">
      <span>☕</span>
      <span>Coffee Shop Owner Console</span>
    </div>
    <div class="status">
      <div class="dot"></div>
      AI Pipeline Active
    </div>
  </div>

  <!-- Chat Area -->
  <div class="chat-area" id="chatArea">
    <div class="welcome" id="welcomeMsg">
      <div class="emoji">☕</div>
      <h2>Welcome, Owner!</h2>
      <p>Use natural language to manage your coffee shop. I'll parse your commands, update the menu, test changes, and deploy automatically.</p>
      <div class="examples">
        <button class="example-btn" onclick="useExample('Add Cappuccino for 180')">Add Cappuccino for 180</button>
        <button class="example-btn" onclick="useExample('Remove Americano')">Remove Americano</button>
        <button class="example-btn" onclick="useExample('Update price of Coffee to 130')">Update Coffee price to 130</button>
        <button class="example-btn" onclick="useExample('Disable Espresso')">Disable Espresso</button>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-wrapper">
      <input
        type="text"
        id="cmdInput"
        placeholder="Type a command... e.g., 'Add Mocha for 160'"
        autocomplete="off"
        onkeydown="if(event.key==='Enter') sendCommand()"
      />
      <button class="send-btn" id="sendBtn" onclick="sendCommand()">➤</button>
    </div>
    <div class="input-hint">Press Enter to send · AI-powered command parsing</div>
  </div>

  <script>
    const chatArea = document.getElementById('chatArea');
    const cmdInput = document.getElementById('cmdInput');
    const sendBtn = document.getElementById('sendBtn');
    const welcomeMsg = document.getElementById('welcomeMsg');
    let firstMessage = true;

    function useExample(text) {
      cmdInput.value = text;
      cmdInput.focus();
    }

    function addMessage(text, type, extra) {
      if (firstMessage) {
        welcomeMsg.style.display = 'none';
        firstMessage = false;
      }

      const msg = document.createElement('div');
      msg.className = `message ${type}`;

      const time = new Date().toLocaleTimeString();

      if (type === 'user') {
        msg.innerHTML = `
          <div class="bubble">${escapeHtml(text)}</div>
          <div class="meta">${time}</div>
        `;
      } else {
        let html = `<div class="bubble">${text}`;
        if (extra) {
          html += renderPipelineResult(extra);
        }
        html += `</div><div class="meta">AI System · ${time}</div>`;
        msg.innerHTML = html;
      }

      chatArea.appendChild(msg);
      chatArea.scrollTop = chatArea.scrollHeight;
      return msg;
    }

    async function fetchWithRetryClient(url, options, retries = 3, delay = 3000) {
      for (let i = 0; i < retries; i++) {
        try {
          const res = await fetch(url, options);
          if (res.ok) return res;
          if (res.status === 503) {
            // Backend unavailable, update UI status
            updateTypingStatus('Backend restarting, retrying...');
            throw new Error('503');
          }
          return res; // Return other errors to be handled by the caller
        } catch (err) {
          if (i === retries - 1) throw new Error("Backend temporarily unavailable. Please retry.");
          updateTypingStatus('Deployment in progress... Retrying connection...');
        }
        await new Promise(r => setTimeout(r, delay * (i + 1)));
      }
    }

    function addTypingIndicator() {
      const el = document.createElement('div');
      el.className = 'typing-indicator';
      el.id = 'typing';
      el.innerHTML = '<span id="typing-text" style="font-size:0.85rem; color:var(--text-muted); margin-right:8px;">Processing...</span><div class="dot"></div><div class="dot"></div><div class="dot"></div>';
      chatArea.appendChild(el);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function updateTypingStatus(text) {
      const textEl = document.getElementById('typing-text');
      if (textEl) textEl.textContent = text;
    }

    function removeTypingIndicator() {
      const el = document.getElementById('typing');
      if (el) el.remove();
    }

    function renderPipelineResult(data) {
      if (!data.pipeline && !data.parsedAction) return '';

      let html = '<div class="pipeline-result">';

      // Show parsed action
      if (data.parsedAction) {
        html += `<div class="step"><span class="icon">🤖</span> Action: <strong>${data.parsedAction.action}</strong>`;
        if (data.parsedAction.name) html += ` · ${data.parsedAction.name}`;
        if (data.parsedAction.price) html += ` · ₹${data.parsedAction.price}`;
        html += '</div>';
      }

      // Show pipeline steps
      if (data.pipeline?.steps) {
        data.pipeline.steps.forEach(step => {
          const icon = step.status === 'success' ? '✅' : '❌';
          html += `<div class="step"><span class="icon">${icon}</span> ${step.step}: ${step.detail}</div>`;
        });
      }

      // Status badge
      const status = data.status || data.pipeline?.status || 'UNKNOWN';
      let badgeClass = 'error';
      if (status === 'DEPLOYED' || status === 'COMPLETED') badgeClass = 'deployed';
      else if (status === 'REJECTED') badgeClass = 'rejected';

      html += `<div class="status-badge ${badgeClass}">${status}</div>`;
      html += '</div>';
      return html;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function sendCommand() {
      const command = cmdInput.value.trim();
      if (!command) return;

      cmdInput.value = '';
      sendBtn.disabled = true;
      cmdInput.disabled = true;

      addMessage(command, 'user');
      addTypingIndicator();

      try {
        const res = await fetchWithRetryClient('/api/command', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ command })
        }, 3, 2000);

        removeTypingIndicator();

        const data = await res.json();

        if (data.error) {
          addMessage(`❌ ${data.error}`, 'system');
        } else {
          let summary = '';
          if (data.status === 'DEPLOYED' || data.pipeline?.status === 'DEPLOYED') {
            summary = '✅ Changes deployed successfully! The menu has been updated.';
          } else if (data.status === 'REJECTED' || data.pipeline?.status === 'REJECTED') {
            summary = '⚠️ Changes were rejected. Tests did not pass — no changes deployed.';
          } else if (data.status === 'PARSE_ERROR') {
            summary = `❌ Could not understand the command. Try something like "Add Latte for 150"`;
          } else {
            summary = `Pipeline completed with status: ${data.status || 'unknown'}`;
          }
          addMessage(summary, 'system', data);
        }
      } catch (err) {
        removeTypingIndicator();
        addMessage(`❌ ${err.message}`, 'system');
      }

      sendBtn.disabled = false;
      cmdInput.disabled = false;
      cmdInput.focus();
    }
  </script>
</body>
</html>
