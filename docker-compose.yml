version: "3.8"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        CACHE_BUST: ${CACHE_BUST:-default}
    ports:
      - "5173:80"
    environment:
      # For production inside Docker, frontend talks to backend via https://backend:3000
      - VITE_API_URL=http://backend:3000
      # For development override: export VITE_API_URL=http://localhost:3000
    depends_on:
      - backend
    networks:
      - coffee-net
    restart: unless-stopped
    labels:
      - "traefik.enable=false"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000/health"]
      interval: 5s
      timeout: 2s
      retries: 5
    env_file:
      - .env
    environment:
      - AGENT_URL=http://agent:3001
      - MCP_URL=http://mcp-server:4000
    volumes:
      - backend-data:/app/data
    networks:
      - coffee-net
    restart: unless-stopped

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - BACKEND_URL=http://backend:3000
      - MCP_URL=http://mcp-server:4000
      - FRONTEND_URL=http://frontend
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - REPO_URL=${REPO_URL}
    volumes:
      - agent-workspace:/app/workspace
    networks:
      - coffee-net
    restart: unless-stopped

  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - BACKEND_URL=http://backend:3000
      - FRONTEND_URL=http://frontend
    networks:
      - coffee-net
    restart: unless-stopped

  deployment-service:
    build:
      context: ./deployment-service
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/opt/MCP-Cofffe-Shop
      - agent-workspace:/app/workspace
    networks:
      - coffee-net
    restart: unless-stopped

  openwebui:
    build:
      context: ./openwebui
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      - BACKEND_URL=http://backend:3000
    networks:
      - coffee-net
    depends_on:
      - backend
    restart: unless-stopped

networks:
  coffee-net:
    driver: bridge

volumes:
  backend-data:
  agent-workspace:
